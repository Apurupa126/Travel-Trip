<!DOCTYPE html>
<html>
<head>
  <title>Nearby ATMs - Smart Travel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('https://images.unsplash.com/photo-1581093448790-5bc948c6ecce?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
      /* Attractive ATM or banking themed background */
      background-size: cover;
      color: #f1f1f1;
    }

    .container {
      max-width: 600px;
      margin: 80px auto;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #00ffff;
      font-weight: 600;
      text-shadow: 0 0 10px rgba(0,255,255,0.5);
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: rgba(255, 255, 255, 0.1);
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 10px;
      transition: transform 0.3s ease, background 0.3s ease;
    }

    li:hover {
      transform: scale(1.02);
      background: rgba(255,255,255,0.2);
    }

    li strong {
      font-size: 18px;
      color: #00ffff;
    }

    a {
      display: block;
      text-align: center;
      margin-top: 30px;
      text-decoration: none;
      color: #00ffff;
      font-size: 16px;
      border: 1px solid #00ffff;
      padding: 10px;
      border-radius: 5px;
      font-weight: 600;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    a:hover {
      background-color: #00bebe;
      color: black;
    }

    p {
      text-align: center;
      font-size: 18px;
    }

    @media (max-width: 600px) {
      .container {
        width: 90%;
        margin: 40px auto;
        padding: 20px;
      }

      li {
        padding: 12px;
      }

      li strong {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>ATMs near {{ destination }}</h2>

    {% if atms %}
      <ul>
        {% for atm in atms %}
          <li>
            <strong>{{ atm.name }}</strong><br>
            Address: {{ atm.address }}
          </li>
        {% endfor %}
      </ul>
    {% else %}
      <p>No ATMs found.</p>
    {% endif %}

    <a href="{% url 'home' %}">Back to Home</a>
  </div>
</body>
</html>
