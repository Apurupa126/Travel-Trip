<!DOCTYPE html>
<html>
<head>
  <title>Smart Travel Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center fixed;
      background-size: cover;
      color: #f0f0f0;
    }

    .chatbox {
      background: rgba(0, 0, 0, 0.7);
      padding: 30px;
      border-radius: 12px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #00cec9;
    }

    form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    input[type="text"] {
      flex: 1 1 70%;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      background: rgba(255,255,255,0.95);
      color: #333;
    }

    button {
      padding: 12px 15px;
      border: none;
      border-radius: 5px;
      background-color: #00b894;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #019875;
    }

    h3 {
      margin-top: 30px;
      color: #81ecec;
    }

    pre {
      background: rgba(255,255,255,0.95);
      color: #333;
      padding: 15px;
      border-radius: 5px;
      font-size: 15px;
      overflow-x: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      background-color: #00b894;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    a:hover {
      background-color: #019875;
    }

    @media (max-width: 600px) {
      .chatbox {
        padding: 20px;
      }

      input[type="text"] {
        flex: 1 1 100%;
      }

      button {
        flex: 1 1 45%;
      }
    }
  </style>
</head>
<body>
  <div class="chatbox">
    <h2>Travel Chatbot for {{ destination }}</h2>
    <form method="post">
      {% csrf_token %}
      <input type="text" name="user_prompt" placeholder="Ask your query..." required>
      <button type="submit">Send</button>
      <button type="button" onclick="startDictation()">🎤 Speak</button>
    </form>

    {% if response %}
      <h3>Bot Response:</h3>
      <pre>{{ response }}</pre>
    {% endif %}

    <a href="{% url 'home' %}">Back to Home</a>
  </div>

  <script>
    function startDictation() {
      if ('webkitSpeechRecognition' in window) {
        var recognition = new webkitSpeechRecognition();
        recognition.lang = "en-IN";
        recognition.onresult = function(event) {
          document.getElementsByName('user_prompt')[0].value = event.results[0][0].transcript;
        };
        recognition.start();
      } else {
        alert("Your browser does not support Speech Recognition.");
      }
    }
  </script>
</body>
</html>
