<!DOCTYPE html>
<html>
<head>
  <title>Restaurants in {{ destination }}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0') no-repeat center center fixed;
      background-size: cover;
      color: #f0f0f0;
    }

    .container {
      max-width: 800px;
      margin: 60px auto;
      background: rgba(0, 0, 0, 0.75);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #81ecec;
      font-size: 28px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      margin-bottom: 20px;
      padding: 15px 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      transition: transform 0.2s ease;
    }

    li:hover {
      transform: scale(1.02);
    }

    strong {
      font-size: 18px;
      color: #00b894;
    }

    a {
      display: inline-block;
      margin-top: 25px;
      text-decoration: none;
      background-color: #00b894;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    a:hover {
      background-color: #019875;
    }

    p {
      text-align: center;
      font-size: 18px;
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      .container {
        margin: 30px 20px;
        padding: 20px;
      }

      h2 {
        font-size: 24px;
      }

      strong {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Restaurants in {{ destination }}</h2>

    {% if restaurants %}
      <ul>
        {% for restaurant in restaurants %}
          <li>
            <strong>{{ restaurant.name }}</strong><br>
            Address: {{ restaurant.address }}<br>
            Rating: {{ restaurant.rating }} / 5
          </li>
        {% endfor %}
      </ul>
    {% else %}
      <p>No restaurants found for {{ destination }}.</p>
    {% endif %}

    <a href="{% url 'home' %}">Back to Home</a>
  </div>
</body>
</html>
