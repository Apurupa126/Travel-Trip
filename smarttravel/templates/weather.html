<!DOCTYPE html>
<html>
<head>
  <title>Weather</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('https://images.unsplash.com/photo-1502082553048-f009c37129b9') no-repeat center center fixed;
      background-size: cover;
      color: #f0f0f0;
    }

    .container {
      max-width: 500px;
      background: rgba(0,0,0,0.7);
      margin: 100px auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #00cec9;
    }

    p {
      font-size: 18px;
      margin: 10px 0;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      background-color: #00b894;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    a:hover {
      background-color: #019875;
    }

    @media (max-width: 600px) {
      .container {
        margin: 50px 20px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Weather Details for {{ destination }}</h2>

    {% if weather and temp %}
      <p>Weather: {{ weather }}</p>
      <p>Temperature: {{ temp }}°C</p>
    {% elif error %}
      <p>{{ error }}</p>
    {% endif %}

    <a href="{% url 'home' %}">Back to Home</a>
  </div>
</body>
</html>
