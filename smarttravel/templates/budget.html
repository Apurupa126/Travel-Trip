<!DOCTYPE html>
<html>
<head>
  <title>Estimated Budget for {{ destination }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,128,128,0.6)),
                  url('https://images.unsplash.com/photo-1533105079780-92b9be48277d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
      /* Beautiful travel bg image with gradient overlay */
      background-size: cover;
      color: #fff;
      animation: fadeIn 1.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .overlay {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 40px;
      width: 90%;
      max-width: 900px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: slideUp 1s ease forwards;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #00ffff;
      font-weight: 700;
      text-shadow: 0 0 15px rgba(0,255,255,0.6);
    }

    form {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
    }

    .left select, .right select {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin-top: 8px;
      font-size: 15px;
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .left select {
      height: 200px;
    }

    label {
      font-weight: 700;
      margin-top: 15px;
      display: block;
    }

    select:focus, input[type="text"]:focus {
      outline: none;
      background: rgba(255,255,255,0.3);
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin-top: 8px;
      font-size: 15px;
      background: rgba(255,255,255,0.2);
      color: white;
    }

    input[type="text"]::placeholder {
      color: #ddd;
    }

    option {
      color: black;
    }

    button {
      background: linear-gradient(to right, #00ffff, #00bebe);
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,255,255,0.4);
    }

    button:hover {
      background: linear-gradient(to right, #00bebe, #00ffff);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,255,255,0.5);
    }

    .back-btn {
      background: transparent;
      border: 2px solid #00ffff;
      color: #00ffff;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: #00ffff;
      color: black;
    }

    .budget-text {
      background: rgba(0, 0, 0, 0.6);
      padding: 15px;
      margin-top: 30px;
      border-radius: 10px;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background-color: #00ffff;
      border-radius: 3px;
    }

    @media(max-width: 768px){
      form {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="container">
      <h2>Estimated Budget for {{ destination }}</h2>

      <form method="post">
        {% csrf_token %}
        <div class="left">
          <label>Places you want to visit (Select multiple):</label>
          <select name="places" multiple required>
            {% if places %}
              {% for place in places %}
                <option value="{{ place }}">{{ place }}</option>
              {% endfor %}
            {% else %}
              <option>No places found. Try again.</option>
            {% endif %}
          </select>
        </div>

        <div class="right">
          <label>Vehicle Type:</label>
          <select name="vehicle" required>
            <option value="">-- None --</option>
            <option value="Car">Car</option>
            <option value="Bus">Bus</option>
            <option value="Bike">Bike</option>
          </select>

          <label>Hotel Type:</label>
          <select name="hotel" required>
            <option value="">-- None --</option>
            <option value="Budget">Budget</option>
            <option value="Standard">Standard</option>
            <option value="Luxury">Luxury</option>
          </select>

          <label>Number of Days Stay:</label>
          <input type="text" name="days" placeholder="Eg: 3" required>

          <label>Food Preference:</label>
          <select name="food" required>
            <option value="">-- None --</option>
            <option value="Vegetarian">Vegetarian</option>
            <option value="Non-Vegetarian">Non-Vegetarian</option>
            <option value="Mixed">Mixed</option>
          </select>
        </div>

        <div style="flex:1 1 100%;">
          <button type="submit">Get Budget Estimate</button>
        </div>
      </form>

      <a href="{% url 'home' %}">
        <button class="back-btn">Back to Home</button>
      </a>

      {% if budget_text %}
        <div class="budget-text">
          {{ budget_text }}
        </div>
      {% endif %}
    </div>
  </div>
</body>
</html>
